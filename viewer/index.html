<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Vim Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="toolbar">
    <span id="filename"></span>
    <span id="page-info">
      Page <span id="current-page">-</span> / <span id="total-pages">-</span>
    </span>
  </div>

  <div id="viewer-container" tabindex="0">
    <div id="pages-container"></div>
    <div id="loading">PDF.jsを読み込み中...</div>
    <div id="error" class="hidden"></div>
  </div>

  <!-- Hint mode overlay (position: fixed over viewer) -->
  <div id="hint-overlay"></div>

  <!-- Search bar (appears at bottom) -->
  <div id="search-bar" class="hidden">
    <span class="search-prefix">/</span>
    <input type="text" id="search-input" autocomplete="off" spellcheck="false">
    <span id="search-results"></span>
    <span class="search-hint">Enter:検索 Esc:閉じる n/N:次/前</span>
  </div>

  <div id="status-bar"></div>

  <script src="../lib/pdf.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
